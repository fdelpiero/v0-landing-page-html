name: Apply bilingual preview source

on:
  push:
    branches:
      - feature/spanish-localization

permissions:
  contents: write

jobs:
  apply:
    if: "${{ github.event.head_commit.message == 'chore: apply bilingual preview patch' }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/spanish-localization
      - name: Apply verified source patch
        run: |
          git apply spanish-localization.patch
          rm spanish-localization.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add bilingual English and Spanish experience"
          git push origin HEAD:feature/spanish-localization
